<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catálogo - Gih Rogenski Presentes</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* Estilos específicos para a vitrine */
    .catalog-container { max-width: 1000px; margin: 0 auto; padding: 20px; }
    .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
    .product-card { background: white; border-radius: 12px; padding: 15px; box-shadow: var(--shadow-sm); text-align: center; transition: 0.3s; border: 1px solid var(--border); }
    .product-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-md); }
    .product-card img, .product-card .placeholder { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
    .product-card .placeholder { background: var(--surface-2); display: flex; align-items: center; justify-content: center; font-size: 3rem; }
    .price-tag { color: var(--gold-dark); font-weight: 700; font-size: 1.2rem; margin: 10px 0; }
    
    .cart-float { position: fixed; bottom: 20px; right: 20px; background: var(--gold); color: white; padding: 15px 25px; border-radius: 30px; box-shadow: var(--shadow-lg); cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: bold; z-index: 1000; }
    
    /* Modal de Carrinho */
    .cart-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 2000; }
    .cart-content { background: white; width: 90%; max-width: 500px; border-radius: 15px; padding: 25px; max-height: 80vh; overflow-y: auto; }
    .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  </style>
</head>
<body>

<div class="catalog-container">
  <header style="text-align: center; margin-bottom: 30px;">
    <h1 style="font-family: 'Playfair Display', serif; color: var(--charcoal);">Gih Rogenski</h1>
    <p style="color: var(--gold-dark); letter-spacing: 2px;">CATÁLOGO DE PRESENTES</p>
  </header>

  <div id="catalog-grid" class="catalog-grid">
    </div>
</div>

<div class="cart-float" onclick="toggleCart()">
  🛒 Carrinho (<span id="cart-count">0</span>)
</div>

<div id="cart-modal" class="cart-modal">
  <div class="cart-content">
    <h2 style="margin-bottom: 20px; font-family: 'Playfair Display';">Seu Pedido</h2>
    <div id="cart-items"></div>
    <div style="margin-top: 20px; font-weight: bold; font-size: 1.2rem;"> Total: <span id="cart-total">R$ 0,00</span></div>
    
    <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--border);">
    
    <div class="form-group">
      <label>Seu Nome *</label>
      <input type="text" id="cust-name" placeholder="Como te chamamos?">
    </div>
    <div class="form-group">
      <label>WhatsApp / Telefone *</label>
      <input type="text" id="cust-phone" placeholder="(00) 00000-0000">
    </div>
    
    <div style="display: flex; gap: 10px; margin-top: 20px;">
      <button class="btn-secondary" style="flex:1" onclick="toggleCart()">Continuar Comprando</button>
      <button class="btn-primary" style="flex:2" onclick="sendOrder()">Finalizar via WhatsApp</button>
    </div>
  </div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDCcGyb72FwycLCiqroKxm2kz-mkUFqDew",
    authDomain: "gihrogenskipresentes.firebaseapp.com",
    databaseURL: "https://gihrogenskipresentes-default-rtdb.firebaseio.com",
    projectId: "gihrogenskipresentes",
    storageBucket: "gihrogenskipresentes.firebasestorage.app",
    messagingSenderId: "915467625762",
    appId: "1:915467625762:web:c4b7ac22cd24178b24317b",
    measurementId: "G-YMQTYE5G6Q"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  let cart = [];

  function loadCatalog() {
    // Agora busca direto do Firebase em tempo real
    db.ref('gih_data/products').on('value', (snapshot) => {
      const products = snapshot.val() || [];
      const grid = document.getElementById('catalog-grid');
      
      const availableProducts = Object.values(products).filter(p => p.stockQty > 0);

      if (availableProducts.length === 0) {
        grid.innerHTML = '<p style="text-align:center; grid-column: 1/-1;">Nenhum produto disponível no momento.</p>';
        return;
      }

      grid.innerHTML = availableProducts.map(p => `
        <div class="product-card">
          ${p.image ? `<img src="${p.image}">` : '<div class="placeholder">🎁</div>'}
          <h3 style="font-size: 1rem; margin: 10px 0;">${p.name}</h3>
          <p class="price-tag">${new Intl.NumberFormat('pt-BR', {style:'currency', currency:'BRL'}).format(p.price)}</p>
          <button class="btn-primary" style="width:100%" onclick="addToCart('${p.id}', '${p.name}', ${p.price})">Adicionar</button>
        </div>
      `).join('');
    });
  }

  // ... (as outras funções addToCart, updateCartUI, toggleCart e sendOrder permanecem iguais)
  window.onload = loadCatalog;
</script>
</body>
</html>
